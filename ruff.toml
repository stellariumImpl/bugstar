# BugStar ruff 配置
# 刻意保持最小化,避免对既有代码狂喷红

line-length = 100
target-version = "py311"

[lint]
# E: pycodestyle 错误   F: pyflakes(未使用导入/变量)   I: isort(导入顺序)
select = ["E", "F", "I"]

# 这些规则对现有项目噪音较大,先放过
ignore = [
    "E501",  # 行太长,line-length 已经够用
]

[lint.per-file-ignores]
# 测试代码可以糙一些
"tests/*" = ["E", "F401"]