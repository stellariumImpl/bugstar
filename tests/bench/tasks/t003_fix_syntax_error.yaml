id: t003_fix_syntax_error
description: 修复一个存在语法错误的 Python 文件，让它能正常运行
prompt: |
  当前目录有一个 broken.py，它存在语法错误跑不起来. 请修复它，让 `python3 broken.py` 能正常运行并输出 "ok".
timeout_s: 90
fixtures:
  - from: broken.py
    to: broken.py
checks:
  # 只关心最终结果是否对. 不强制 agent 用几次工具——
  # 它如果一次性就能猜对修法，那是更好.
  - type: shell
    cmd: python3 broken.py
    expect_exit_code: 0
    expect_stdout_contains: "ok"