id: t008_multistep_script
description: 多步任务 —— 写脚本 + 运行 + 把结果存进文件
prompt: |
  计算 1 到 100 的所有偶数之和，把结果写入 result.txt (只写数字，不加其他文字).
timeout_s: 90
checks:
  - type: file_exists
    path: result.txt
  # 用 grep -q 代替 grep -x：实际用户场景下，"包含 2550" 已经够用,
  # 不要因为多个 \n 或前后空格而 fail.
  - type: shell
    cmd: grep -q '\b2550\b' result.txt
    expect_exit_code: 0
  - type: tool_called
    name: terminal
    min_times: 1